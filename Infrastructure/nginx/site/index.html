<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FaciHub</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --text: #e4e4ed;
            --text-muted: #8888a0;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --glow: rgba(108, 92, 231, 0.15);
        }

        body {
            font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: -40%;
            left: -20%;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
            pointer-events: none;
            animation: drift 20s ease-in-out infinite alternate;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30%, 20%) scale(1.2); }
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem 3.5rem;
            max-width: 520px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 60px rgba(0, 0, 0, 0.4);
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -1px;
            box-shadow: 0 0 30px var(--glow);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            background: rgba(108, 92, 231, 0.08);
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 100px;
            font-size: 0.85rem;
            color: var(--accent-light);
            font-weight: 500;
        }

        .status::before {
            content: "";
            width: 8px;
            height: 8px;
            background: #00e676;
            border-radius: 50%;
            box-shadow: 0 0 8px #00e676;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 2rem 0 1.5rem;
        }

        .info {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .info-item strong {
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
        }

        footer {
            position: absolute;
            bottom: 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        @media (max-width: 480px) {
            .card { padding: 2rem 1.5rem; }
            h1 { font-size: 1.5rem; }
            .info { gap: 1.5rem; }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">F</div>
        <h1>FaciHub</h1>
        <p class="subtitle">Infraestrutura online e operacional.</p>
        <span class="status">Todos os sistemas ativos</span>
        <div class="divider"></div>
        <div class="info">
            <div class="info-item">
                <span>Proxy</span>
                <strong>Traefik</strong>
            </div>
            <div class="info-item">
                <span>TLS</span>
                <strong>Let's Encrypt</strong>
            </div>
            <div class="info-item">
                <span>Server</span>
                <strong>Nginx</strong>
            </div>
        </div>
    </div>
    <footer>&copy; 2026 FaciHub</footer>
</body>

</html>
