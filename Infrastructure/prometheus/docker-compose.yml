networks:
  monitoring:
    external: true
    name: monitoring
  production:
    external: true
    name: production

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    labels:
      # Habilita descoberta do container
      - traefik.enable=true
      # Habilita a rota do traefik
      - traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)
      - traefik.http.routers.prometheus.entrypoints=websecure
      - traefik.http.routers.prometheus.tls=true
      # Habilita o service do traefik (Exposer a porta interna do prometheus)
      - traefik.http.services.prometheus.loadbalancer.server.port=9090
      # Habilita o moddleware de segurança
      - traefik.http.middlewares.prometheus-auth.basicauth.users=admin:$$2a$$10$$hu2CMcBV8XJx6KxyLr9jeuQMvfuANgpjCnZfOfI8mz0tJDg87cR4G
      - traefik.http.routers.prometheus.middlewares=prometheus-auth
      - traefik.docker.network=production
    networks:
      - monitoring
      - production

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring