networks:
  databases:
    name: databases
    driver: bridge
  monitoring:
    name: monitoring
    driver: bridge

services:
  # ══════════════════════════════════════════════════════════════════════════
  # DATABASE - Servidor MySQL
  # ══════════════════════════════════════════════════════════════════════════
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_EXPORTER_USER=${MYSQL_EXPORTER_USER}
      - MYSQL_EXPORTER_PASSWORD=${MYSQL_EXPORTER_PASSWORD}
      - LANG=C.UTF-8
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./conf/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - databases

  # ══════════════════════════════════════════════════════════════════════════
  # DATABASE SETUP - Configuração inicial (database, usuário, permissões)
  # ══════════════════════════════════════════════════════════════════════════
  mysql-setup:
    build:
      context: ./Setup
      dockerfile: Dockerfile
    container_name: mysql-setup
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
    networks:
      - databases

  # ══════════════════════════════════════════════════════════════════════════
  # EXPORTER - Métricas para Prometheus
  # ══════════════════════════════════════════════════════════════════════════
  mysql_exporter:
    image: quay.io/prometheus/mysqld-exporter:latest
    container_name: mysql_exporter
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "9104:9104"
    env_file:
      - .env
    command:
      - "--mysqld.username=${MYSQL_EXPORTER_USER}:${MYSQL_EXPORTER_PASSWORD}"
      - "--mysqld.address=mysql:3306"
    networks:
      - databases
      - monitoring

volumes:
  mysql_data:
    driver: local
    name: mysql_data
