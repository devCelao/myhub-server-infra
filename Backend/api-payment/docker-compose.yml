networks:
  production:
    external: true
    name: production
  databases:
    external: true
    name: databases
  messaging:
    external: true
    name: messaging

services:
  api-payment:
    image: ${DOCKERHUB_REPO}/api-payment:${IMAGE_TAG}
    container_name: api-payment
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - Connection__ConnectionString=Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD}
      - Connection__Schema=${DB_SCHEMA}
      - MessageQueueConnection__MessageBus=host=rabbitmq;port=5672;username=${RABBITMQ_USER};password=${RABBITMQ_PASSWORD}
      - Jwt__Audience=${DOMAIN}
    labels:
      - traefik.enable=true
      - traefik.http.routers.api-payment.rule=Host(`api-payment.${DOMAIN}`)
      - traefik.http.routers.api-payment.entrypoints=websecure
      - traefik.http.services.api-payment.loadbalancer.server.port=8080
      - traefik.http.routers.api-payment.tls=true
      - traefik.http.routers.api-payment.tls.certresolver=letsencrypt
    networks:
      - production
      - databases
      - messaging
