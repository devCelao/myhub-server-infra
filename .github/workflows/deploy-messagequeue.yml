name: "Deploy MessageQueue"

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Serviço para deploy"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - RabbitMQ

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ${{ inputs.service == 'all' && 'MessageQueue/' || format('MessageQueue/{0}/', inputs.service) }}
          target: ${{ secrets.DEPLOY_PATH }}
